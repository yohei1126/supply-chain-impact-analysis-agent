name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Lint and type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check ontology domains pipeline app tests scripts

      - name: Ruff format
        run: uv run ruff format --check ontology domains pipeline app tests scripts

      - name: Mypy
        run: uv run mypy ontology domains pipeline app

      - name: Markdown internal links
        run: uv run python -m pytest -q tests/test_markdown_links.py

      - name: Sync ontology assets (SSOT export + Graph Contract validation)
        run: |
          uv run python scripts/sync_ontology.py
          git diff --exit-code -- \
            ontology/assets/ontology.json \
            skills/bom-ontology/assets/ontology.json \
            skills/bom-graph-explorer/assets/graph-context.json \
            skills/bom-graph-explorer/assets/query-catalog.json \
            skills/bom-graph-explorer/assets/cypher-engine-profile.json

      - name: Unit tests (no Neo4j)
        run: |
          uv run python -m pytest -q \
            tests/test_schema.py \
            tests/test_ontology_isolation.py \
            tests/test_skill_ontology_asset.py \
            tests/test_skill_agent_assets.py \
            tests/test_agent.py \
            tests/test_llm_client.py \
            tests/test_user_response.py \
            tests/test_explain.py \
            tests/test_run_report.py \
            tests/test_cypher_builder.py \
            tests/test_domain_layout.py \
            tests/test_domain_graphs.py::test_graph_for_edge_mapping \
            tests/test_write_path_guardrails.py \
            tests/test_graph_contract.py \
            tests/test_cli_smoke.py::test_sync_ontology_cli

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7687:7687
    env:
      BOM_NEO4J_URI: bolt://localhost:7687
      BOM_NEO4J_USER: neo4j
      BOM_NEO4J_PASSWORD: password
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Wait for Neo4j
        run: |
          for attempt in $(seq 1 30); do
            if uv run python -c "from app.storage.neo4j_config import get_driver, verify_connectivity; d=get_driver(); verify_connectivity(d); d.close()"; then
              echo "Neo4j is ready"
              exit 0
            fi
            echo "Waiting for Neo4j (${attempt}/30)..."
            sleep 2
          done
          echo "Neo4j did not become ready in time"
          exit 1

      - name: L3 Neo4j conformance audit
        run: |
          uv run python scripts/seed_complex_bom.py --reset
          uv run python scripts/audit_neo4j.py --quiet

      - name: Pytest
        run: |
          set -o pipefail
          uv run python -m pytest -q -rs 2>&1 | tee pytest.log
          if grep -E '[1-9][0-9]* skipped' pytest.log; then
            echo "Neo4j-dependent tests were skipped; CI requires all tests to run."
            exit 1
          fi

  langfuse-smoke:
    name: Langfuse smoke (optional)
    runs-on: ubuntu-latest
    if: ${{ secrets.LANGFUSE_PUBLIC_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra observability

      - name: Verify Langfuse telemetry
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: uv run --extra observability python scripts/verify_langfuse_telemetry.py
